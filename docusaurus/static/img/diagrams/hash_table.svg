<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180"  class="diagram-svg" role="img" aria-label="Hash table: key is hashed to a bucket index, and the value is stored there">
    <style>
  :root {
    --d-bg:        #f4f4f8;
    --d-card:      #ffffff;
    --d-primary:   #6d28d9;
    --d-accent:    #7c3aed;
    --d-text:      #111827;
    --d-muted:     #4b5563;
    --d-l1-fill:   #bfdbfe; --d-l1-stroke: #2563eb;
    --d-l2-fill:   #bbf7d0; --d-l2-stroke: #16a34a;
    --d-l3-fill:   #fde68a; --d-l3-stroke: #d97706;
    --d-l4-fill:   #e9d5ff; --d-l4-stroke: #7c3aed;
    --d-sem:       #a78bfa;
    --d-empty:     #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --d-bg:        #1e1e2e;
      --d-card:      #2d2d44;
      --d-primary:   #a78bfa;
      --d-accent:    #c4b5fd;
      --d-text:      #f1f5f9;
      --d-muted:     #a0aec0;
      --d-l1-fill:   #1e40af; --d-l1-stroke: #60a5fa;
      --d-l2-fill:   #166534; --d-l2-stroke: #4ade80;
      --d-l3-fill:   #92400e; --d-l3-stroke: #fbbf24;
      --d-l4-fill:   #4c1d95; --d-l4-stroke: #c4b5fd;
      --d-sem:       #6d5acd;
      --d-empty:     #374151;
    }
  }


      .ht-key    { fill: var(--d-l1-fill); stroke: var(--d-l1-stroke); stroke-width: 2; }
      .ht-hash   { fill: var(--d-l4-fill); stroke: var(--d-l4-stroke); stroke-width: 2; }
      .ht-bucket { fill: var(--d-l3-fill); stroke: var(--d-l3-stroke); stroke-width: 2; }
      .ht-val    { fill: var(--d-l2-fill); stroke: var(--d-l2-stroke); stroke-width: 2; }
      .ht-arr    { stroke: var(--d-muted); stroke-width: 1.5; fill: none; marker-end: url(#ht-arrow); }
      .ht-txt    { fill: var(--d-text);       font: 13px monospace; text-anchor: middle; dominant-baseline: middle; }
      .ht-lbl    { fill: var(--d-muted); font: 10px system-ui,sans-serif; text-anchor: middle; }
    </style>
    <defs>
      <marker id="ht-arrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
        <polygon points="0 0, 7 2.5, 0 5" fill="var(--d-muted)" />
      </marker>
    </defs>

    
    <text x="80"  y="16" class="ht-lbl">key</text>
    <text x="220" y="16" class="ht-lbl">hash(key)</text>
    <text x="370" y="16" class="ht-lbl">bucket index</text>
    <text x="530" y="16" class="ht-lbl">value</text>

    
    <rect x="20"  y="30" width="120" height="32" class="ht-key"   rx="4"/>
    <text x="80"  y="47" class="ht-txt">&quot;name&quot;</text>
    <line x1="140" y1="46" x2="158" y2="46" class="ht-arr"/>
    <rect x="160" y="30" width="120" height="32" class="ht-hash"  rx="4"/>
    <text x="220" y="47" class="ht-txt">hash()</text>
    <line x1="280" y1="46" x2="298" y2="46" class="ht-arr"/>
    <rect x="300" y="30" width="120" height="32" class="ht-bucket" rx="4"/>
    <text x="360" y="47" class="ht-txt">bucket[42]</text>
    <line x1="420" y1="46" x2="438" y2="46" class="ht-arr"/>
    <rect x="440" y="30" width="120" height="32" class="ht-val"   rx="4"/>
    <text x="500" y="47" class="ht-txt">&quot;Alice&quot;</text>

    
    <rect x="20"  y="74" width="120" height="32" class="ht-key"   rx="4"/>
    <text x="80"  y="91" class="ht-txt">&quot;age&quot;</text>
    <line x1="140" y1="90" x2="158" y2="90" class="ht-arr"/>
    <rect x="160" y="74" width="120" height="32" class="ht-hash"  rx="4"/>
    <text x="220" y="91" class="ht-txt">hash()</text>
    <line x1="280" y1="90" x2="298" y2="90" class="ht-arr"/>
    <rect x="300" y="74" width="120" height="32" class="ht-bucket" rx="4"/>
    <text x="360" y="91" class="ht-txt">bucket[7]</text>
    <line x1="420" y1="90" x2="438" y2="90" class="ht-arr"/>
    <rect x="440" y="74" width="120" height="32" class="ht-val"   rx="4"/>
    <text x="500" y="91" class="ht-txt">25</text>

    
    <rect x="20"  y="118" width="120" height="32" class="ht-key"   rx="4"/>
    <text x="80"  y="135" class="ht-txt">&quot;city&quot;</text>
    <line x1="140" y1="134" x2="158" y2="134" class="ht-arr"/>
    <rect x="160" y="118" width="120" height="32" class="ht-hash"  rx="4"/>
    <text x="220" y="135" class="ht-txt">hash()</text>
    <line x1="280" y1="134" x2="298" y2="134" class="ht-arr"/>
    <rect x="300" y="118" width="120" height="32" class="ht-bucket" rx="4"/>
    <text x="360" y="135" class="ht-txt">bucket[19]</text>
    <line x1="420" y1="134" x2="438" y2="134" class="ht-arr"/>
    <rect x="440" y="118" width="120" height="32" class="ht-val"   rx="4"/>
    <text x="500" y="135" class="ht-txt">&quot;Toronto&quot;</text>

    
    <text x="340" y="168" class="ht-lbl" style="font-size:11px">Each key hashes to a unique bucket index → O(1) average lookup, no searching</text>
  </svg>