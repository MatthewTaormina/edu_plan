<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350"  class="diagram-svg">
    <style>
  :root {
    --d-bg:        #f4f4f8;
    --d-card:      #ffffff;
    --d-primary:   #6d28d9;
    --d-accent:    #7c3aed;
    --d-text:      #111827;
    --d-muted:     #4b5563;
    --d-l1-fill:   #bfdbfe; --d-l1-stroke: #2563eb;
    --d-l2-fill:   #bbf7d0; --d-l2-stroke: #16a34a;
    --d-l3-fill:   #fde68a; --d-l3-stroke: #d97706;
    --d-l4-fill:   #e9d5ff; --d-l4-stroke: #7c3aed;
    --d-sem:       #a78bfa;
    --d-empty:     #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --d-bg:        #1e1e2e;
      --d-card:      #2d2d44;
      --d-primary:   #a78bfa;
      --d-accent:    #c4b5fd;
      --d-text:      #f1f5f9;
      --d-muted:     #a0aec0;
      --d-l1-fill:   #1e40af; --d-l1-stroke: #60a5fa;
      --d-l2-fill:   #166534; --d-l2-stroke: #4ade80;
      --d-l3-fill:   #92400e; --d-l3-stroke: #fbbf24;
      --d-l4-fill:   #4c1d95; --d-l4-stroke: #c4b5fd;
      --d-sem:       #6d5acd;
      --d-empty:     #374151;
    }
  }


      .bg-app      { fill: var(--d-l1-fill); stroke: var(--d-l1-stroke); stroke-width: 2; }
        .bg-transport { fill: var(--d-l2-fill); stroke: var(--d-l2-stroke); stroke-width: 2; }
        .bg-internet  { fill: var(--d-l3-fill); stroke: var(--d-l3-stroke); stroke-width: 2; }
        .bg-network   { fill: var(--d-l4-fill); stroke: var(--d-l4-stroke); stroke-width: 2; }
        .dg-title { fill: var(--d-text);       font-family: system-ui,sans-serif; font-weight: bold; font-size: 18px; text-anchor: middle; }
        .dg-sub   { fill: var(--d-muted); font-family: monospace;                   font-size: 13px;   text-anchor: middle; }
        .dg-arrow { stroke: var(--d-muted); stroke-width: 2; marker-end: url(#arrow-tcp); }
    </style>
    <defs>
      <marker id="arrow-tcp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="var(--d-muted)" />
      </marker>
    </defs>

    
    <rect x="100" y="20" width="400" height="60" class="bg-app" rx="6"/>
    <text x="300" y="46" class="dg-title">Application Layer</text>
    <text x="300" y="65" class="dg-sub">HTTP · DNS · SSH · SMTP · FTP</text>
    <line x1="300" y1="80" x2="300" y2="100" class="dg-arrow" />

    
    <rect x="100" y="100" width="400" height="60" class="bg-transport" rx="6"/>
    <text x="300" y="126" class="dg-title">Transport Layer</text>
    <text x="300" y="146" class="dg-sub">TCP · UDP (Ports, segments, reliable delivery)</text>
    <line x1="300" y1="160" x2="300" y2="180" class="dg-arrow" />

    
    <rect x="100" y="180" width="400" height="60" class="bg-internet" rx="6"/>
    <text x="300" y="206" class="dg-title">Internet Layer</text>
    <text x="300" y="226" class="dg-sub">IP · ICMP (IP addresses, routing packets)</text>
    <line x1="300" y1="240" x2="300" y2="260" class="dg-arrow" />

    
    <rect x="100" y="260" width="400" height="60" class="bg-network" rx="6"/>
    <text x="300" y="286" class="dg-title">Network Access Layer</text>
    <text x="300" y="306" class="dg-sub">Ethernet · Wi-Fi (MAC addresses, physical frames)</text>
  </svg>