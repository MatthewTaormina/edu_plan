<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"  class="diagram-svg">
    <style>
  :root {
    --d-bg:        #f4f4f8;
    --d-card:      #ffffff;
    --d-primary:   #6d28d9;
    --d-accent:    #7c3aed;
    --d-text:      #111827;
    --d-muted:     #4b5563;
    --d-l1-fill:   #bfdbfe; --d-l1-stroke: #2563eb;
    --d-l2-fill:   #bbf7d0; --d-l2-stroke: #16a34a;
    --d-l3-fill:   #fde68a; --d-l3-stroke: #d97706;
    --d-l4-fill:   #e9d5ff; --d-l4-stroke: #7c3aed;
    --d-sem:       #a78bfa;
    --d-empty:     #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --d-bg:        #1e1e2e;
      --d-card:      #2d2d44;
      --d-primary:   #a78bfa;
      --d-accent:    #c4b5fd;
      --d-text:      #f1f5f9;
      --d-muted:     #a0aec0;
      --d-l1-fill:   #1e40af; --d-l1-stroke: #60a5fa;
      --d-l2-fill:   #166534; --d-l2-stroke: #4ade80;
      --d-l3-fill:   #92400e; --d-l3-stroke: #fbbf24;
      --d-l4-fill:   #4c1d95; --d-l4-stroke: #c4b5fd;
      --d-sem:       #6d5acd;
      --d-empty:     #374151;
    }
  }


      .bg-page    { fill: var(--d-empty);    stroke: var(--d-sem); stroke-width: 2; }
        .bg-header  { fill: var(--d-muted);  stroke: var(--d-l1-stroke); stroke-width: 2; }
        .bg-nav     { fill: var(--d-muted);     stroke: var(--d-l1-stroke); stroke-width: 2; }
        .bg-main    { fill: var(--d-muted);    stroke: var(--d-l2-stroke); stroke-width: 2; }
        .bg-article { fill: var(--d-muted); stroke: var(--d-l2-stroke); stroke-width: 1.5; }
        .bg-aside   { fill: var(--d-muted);   stroke: var(--d-l3-stroke); stroke-width: 2; }
        .bg-footer  { fill: var(--d-muted);  stroke: var(--d-sem); stroke-width: 2; }
        .dg-tag  { fill: var(--d-text);       font-family: monospace;                  font-weight: 700; font-size: 15px; text-anchor: middle; }
        .dg-desc { fill: var(--d-muted); font-family: system-ui,sans-serif; font-size: 12px;  text-anchor: middle; }
    </style>
    
    
    <rect x="50" y="20" width="700" height="460" class="bg-page" />
    <text x="80" y="50" class="dg-tag">&lt;body&gt;</text>

    
    <rect x="80" y="60" width="640" height="60" class="bg-header" rx="4"/>
    <text x="210" y="88" class="dg-tag">&lt;header&gt;</text>
    <text x="210" y="106" class="dg-desc">Site logo, brand</text>

    
    <rect x="400" y="66" width="300" height="48" class="bg-nav" rx="4"/>
    <text x="550" y="88" class="dg-tag">&lt;nav&gt;</text>
    <text x="550" y="105" class="dg-desc">Navigation links</text>

    
    <rect x="80" y="140" width="450" height="250" class="bg-main" rx="4"/>
    <text x="160" y="165" class="dg-tag">&lt;main&gt;</text>

    
    <rect x="100" y="185" width="410" height="185" class="bg-article" rx="4"/>
    <text x="305" y="250" class="dg-tag">&lt;article&gt;</text>
    <text x="305" y="270" class="dg-desc">Independent, reusable content</text>
    <text x="305" y="288" class="dg-desc">(e.g., Blog post, news item)</text>

    
    <rect x="548" y="140" width="172" height="250" class="bg-aside" rx="4"/>
    <text x="634" y="250" class="dg-tag">&lt;aside&gt;</text>
    <text x="634" y="268" class="dg-desc">Related content,</text>
    <text x="634" y="284" class="dg-desc">sidebar, ads</text>

    
    <rect x="80" y="410" width="640" height="50" class="bg-footer" rx="4"/>
    <text x="400" y="440" class="dg-tag">&lt;footer&gt;</text>
    <text x="400" y="455" class="dg-desc">Copyright, secondary links, contact info</text>
  </svg>