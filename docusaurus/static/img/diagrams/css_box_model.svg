<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400"  class="diagram-svg">
    <style>
  :root {
    --d-bg:        #f4f4f8;
    --d-card:      #ffffff;
    --d-primary:   #6d28d9;
    --d-accent:    #7c3aed;
    --d-text:      #111827;
    --d-muted:     #4b5563;
    --d-l1-fill:   #bfdbfe; --d-l1-stroke: #2563eb;
    --d-l2-fill:   #bbf7d0; --d-l2-stroke: #16a34a;
    --d-l3-fill:   #fde68a; --d-l3-stroke: #d97706;
    --d-l4-fill:   #e9d5ff; --d-l4-stroke: #7c3aed;
    --d-sem:       #a78bfa;
    --d-empty:     #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --d-bg:        #1e1e2e;
      --d-card:      #2d2d44;
      --d-primary:   #a78bfa;
      --d-accent:    #c4b5fd;
      --d-text:      #f1f5f9;
      --d-muted:     #a0aec0;
      --d-l1-fill:   #1e40af; --d-l1-stroke: #60a5fa;
      --d-l2-fill:   #166534; --d-l2-stroke: #4ade80;
      --d-l3-fill:   #92400e; --d-l3-stroke: #fbbf24;
      --d-l4-fill:   #4c1d95; --d-l4-stroke: #c4b5fd;
      --d-sem:       #6d5acd;
      --d-empty:     #374151;
    }
  }


      .bg-margin  { fill: var(--d-muted);  stroke: var(--d-muted);  stroke-width: 2; stroke-dasharray: 6 4; }
        .bg-border  { fill: var(--d-muted);  stroke: var(--d-muted);  stroke-width: 5; }
        .bg-padding { fill: var(--d-muted); stroke: var(--d-muted); stroke-width: 2; stroke-dasharray: 4 2; }
        .bg-content { fill: var(--d-muted); stroke: var(--d-muted); stroke-width: 2; }
        .dg-label { fill: var(--d-text);       font-family: monospace;                   font-weight: bold; font-size: 16px; text-anchor: middle; }
        .dg-hint  { fill: var(--d-muted); font-family: system-ui,sans-serif; font-size: 12px;   text-anchor: middle; }
    </style>

    
    <rect x="20" y="20" width="560" height="360" class="bg-margin" rx="6"/>
    <text x="300" y="45" class="dg-label">MARGIN</text>
    <text x="300" y="63" class="dg-hint">clears space outside the border — transparent</text>

    
    <rect x="70" y="80" width="460" height="260" class="bg-border" rx="4"/>
    <text x="300" y="100" class="dg-label">BORDER</text>
    <text x="300" y="115" class="dg-hint">visible edge — solid, dashed, dotted, etc.</text>

    
    <rect x="120" y="130" width="360" height="180" class="bg-padding" rx="4"/>
    <text x="300" y="150" class="dg-label">PADDING</text>
    <text x="300" y="167" class="dg-hint">clears space around content — transparent</text>

    
    <rect x="170" y="195" width="260" height="100" class="bg-content" rx="4"/>
    <text x="300" y="240" class="dg-label">CONTENT</text>
    <text x="300" y="258" class="dg-hint">text · images · child elements</text>
    <text x="300" y="274" class="dg-hint">width × height</text>
  </svg>