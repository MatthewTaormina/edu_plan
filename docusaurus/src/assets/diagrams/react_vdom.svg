<svg xmlns="http://www.w3.org/2000/svg" class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor">
<style>
  /* ── Light mode (default) ── */
  :root {
    --d-bg:       #f4f4f8;
    --d-card:     #ffffff;
    --d-border:   #7c3aed;
    --d-primary:  #7c3aed;
    --d-accent:   #a78bfa;
    --d-text:     #1a1a2e;
    --d-muted:    #6b7280;
    --d-l1-fill: #dbeafe; --d-l1-stroke: #3b82f6;
    --d-l2-fill: #dcfce7; --d-l2-stroke: #16a34a;
    --d-l3-fill: #fef3c7; --d-l3-stroke: #d97706;
    --d-l4-fill: #fce7f3; --d-l4-stroke: #db2777;
    --d-sem:      #c4b5fd;
  }
  /* ── Dark mode via OS (IDE preview) ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --d-bg:       #1e1e2e;
      --d-card:     #27273f;
      --d-border:   #a78bfa;
      --d-primary:  #a78bfa;
      --d-accent:   #c4b5fd;
      --d-text:     #cdd6f4;
      --d-muted:    #8b92a8;
      --d-l1-fill: #1e3a5f; --d-l1-stroke: #3b82f6;
      --d-l2-fill: #14532d; --d-l2-stroke: #16a34a;
      --d-l3-fill: #451a03; --d-l3-stroke: #d97706;
      --d-l4-fill: #4c1d95; --d-l4-stroke: #a78bfa;
      --d-sem:      #4c3f75;
    }
  }
  /* ── Dark mode via Docusaurus toggle ── */
  :root[data-theme="dark"] {
    --d-bg:       #1e1e2e;
    --d-card:     #27273f;
    --d-border:   #a78bfa;
    --d-primary:  #a78bfa;
    --d-accent:   #c4b5fd;
    --d-text:     #cdd6f4;
    --d-muted:    #8b92a8;
    --d-l1-fill: #1e3a5f; --d-l1-stroke: #3b82f6;
    --d-l2-fill: #14532d; --d-l2-stroke: #16a34a;
    --d-l3-fill: #451a03; --d-l3-stroke: #d97706;
    --d-l4-fill: #4c1d95; --d-l4-stroke: #a78bfa;
    --d-sem:      #4c3f75;
  }

</style>

