<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260"  class="diagram-svg" role="img" aria-label="Undirected graph with 5 nodes: A connected to B and C, B connected to D, C connected to D, D connected to E">
    <style>
  /* ── Light mode (default) ── */
  :root {
    --d-bg:       #f4f4f8;
    --d-card:     #ffffff;
    --d-border:   #7c3aed;
    --d-primary:  #7c3aed;
    --d-accent:   #a78bfa;
    --d-text:     #1a1a2e;
    --d-muted:    #6b7280;
    --d-l1-fill: #dbeafe; --d-l1-stroke: #3b82f6;
    --d-l2-fill: #dcfce7; --d-l2-stroke: #16a34a;
    --d-l3-fill: #fef3c7; --d-l3-stroke: #d97706;
    --d-l4-fill: #fce7f3; --d-l4-stroke: #db2777;
    --d-sem:      #c4b5fd;
  }
  /* ── Dark mode via OS (IDE preview) ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --d-bg:       #1e1e2e;
      --d-card:     #27273f;
      --d-border:   #a78bfa;
      --d-primary:  #a78bfa;
      --d-accent:   #c4b5fd;
      --d-text:     #cdd6f4;
      --d-muted:    #8b92a8;
      --d-l1-fill: #1e3a5f; --d-l1-stroke: #3b82f6;
      --d-l2-fill: #14532d; --d-l2-stroke: #16a34a;
      --d-l3-fill: #451a03; --d-l3-stroke: #d97706;
      --d-l4-fill: #4c1d95; --d-l4-stroke: #a78bfa;
      --d-sem:      #4c3f75;
    }
  }
  /* ── Dark mode via Docusaurus toggle ── */
  :root[data-theme="dark"] {
    --d-bg:       #1e1e2e;
    --d-card:     #27273f;
    --d-border:   #a78bfa;
    --d-primary:  #a78bfa;
    --d-accent:   #c4b5fd;
    --d-text:     #cdd6f4;
    --d-muted:    #8b92a8;
    --d-l1-fill: #1e3a5f; --d-l1-stroke: #3b82f6;
    --d-l2-fill: #14532d; --d-l2-stroke: #16a34a;
    --d-l3-fill: #451a03; --d-l3-stroke: #d97706;
    --d-l4-fill: #4c1d95; --d-l4-stroke: #a78bfa;
    --d-sem:      #4c3f75;
  }

      .gr-node { fill: var(--d-l2-fill); stroke: var(--d-l2-stroke); stroke-width: 2.5; }
      .gr-edge { stroke: var(--d-muted); stroke-width: 2; }
      .gr-val  { fill: var(--d-text); font: bold 17px monospace; text-anchor: middle; dominant-baseline: middle; }
      .gr-lbl  { fill: var(--d-muted); font: 11px system-ui,sans-serif; text-anchor: middle; }
      .gr-ann  { fill: var(--d-muted); font: 11px system-ui,sans-serif; text-anchor: start; dominant-baseline: middle; }
    </style>

    
    <line x1="120" y1="100" x2="240" y2="60"  class="gr-edge"/>
    <line x1="120" y1="100" x2="240" y2="160" class="gr-edge"/>
    <line x1="240" y1="60"  x2="370" y2="100" class="gr-edge"/>
    <line x1="240" y1="160" x2="370" y2="100" class="gr-edge"/>
    <line x1="370" y1="100" x2="490" y2="100" class="gr-edge"/>

    
    <circle cx="120" cy="100" r="28" class="gr-node"/>
    <text    x="120"  y="100" class="gr-val">A</text>

    <circle cx="240" cy="60"  r="28" class="gr-node"/>
    <text    x="240"  y="60"  class="gr-val">B</text>

    <circle cx="240" cy="160" r="28" class="gr-node"/>
    <text    x="240"  y="160" class="gr-val">C</text>

    <circle cx="370" cy="100" r="28" class="gr-node"/>
    <text    x="370"  y="100" class="gr-val">D</text>

    <circle cx="490" cy="100" r="28" class="gr-node"/>
    <text    x="490"  y="100" class="gr-val">E</text>

    
    <text x="178" y="55"  class="gr-lbl">A–B</text>
    <text x="178" y="148" class="gr-lbl">A–C</text>
    <text x="302" y="64"  class="gr-lbl">B–D</text>
    <text x="302" y="148" class="gr-lbl">C–D</text>
    <text x="428" y="88"  class="gr-lbl">D–E</text>

    
    <text x="548" y="46"  class="gr-ann">Undirected: edges have</text>
    <text x="548" y="60"  class="gr-ann">no direction (A↔B)</text>
    <text x="548" y="84"  class="gr-ann">Directed: arrow shows</text>
    <text x="548" y="98"  class="gr-ann">one-way flow (A→B)</text>
    <text x="548" y="122" class="gr-ann">Weighted: edges carry</text>
    <text x="548" y="136" class="gr-ann">a cost (distance, time…)</text>

    
    <text x="20"  y="205" class="gr-lbl" style="text-anchor:start;font-size:11px;fill:var(--d-text);font-weight:bold">Adjacency list (how this graph is stored):</text>
    <text x="20"  y="222" class="gr-lbl" style="text-anchor:start;font-family:monospace;font-size:11px;fill:var(--d-text)">A → [B, C]   B → [A, D]   C → [A, D]   D → [B, C, E]   E → [D]</text>
  </svg>