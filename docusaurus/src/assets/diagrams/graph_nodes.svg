<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" class="diagram-svg" role="img" aria-label="Undirected graph with 5 nodes: A connected to B and C, B connected to D, C connected to D, D connected to E">
    <style>
      .gr-node { fill: var(--diagram-layer-2-fill); stroke: var(--diagram-layer-2-stroke); stroke-width: 2.5; }
      .gr-edge { stroke: var(--diagram-text-muted); stroke-width: 2; }
      .gr-val  { fill: var(--diagram-text); font: bold 17px monospace; text-anchor: middle; dominant-baseline: middle; }
      .gr-lbl  { fill: var(--diagram-text-muted); font: 11px var(--ifm-font-family-base); text-anchor: middle; }
      .gr-ann  { fill: var(--diagram-text-muted); font: 11px var(--ifm-font-family-base); text-anchor: start; dominant-baseline: middle; }
    </style>

    {/* Edges (undirected — no arrowheads) */}
    <line x1="120" y1="100" x2="240" y2="60"  class="gr-edge"/>{/* A-B */}
    <line x1="120" y1="100" x2="240" y2="160" class="gr-edge"/>{/* A-C */}
    <line x1="240" y1="60"  x2="370" y2="100" class="gr-edge"/>{/* B-D */}
    <line x1="240" y1="160" x2="370" y2="100" class="gr-edge"/>{/* C-D */}
    <line x1="370" y1="100" x2="490" y2="100" class="gr-edge"/>{/* D-E */}

    {/* Nodes */}
    <circle cx="120" cy="100" r="28" class="gr-node"/>
    <text    x="120"  y="100" class="gr-val">A</text>

    <circle cx="240" cy="60"  r="28" class="gr-node"/>
    <text    x="240"  y="60"  class="gr-val">B</text>

    <circle cx="240" cy="160" r="28" class="gr-node"/>
    <text    x="240"  y="160" class="gr-val">C</text>

    <circle cx="370" cy="100" r="28" class="gr-node"/>
    <text    x="370"  y="100" class="gr-val">D</text>

    <circle cx="490" cy="100" r="28" class="gr-node"/>
    <text    x="490"  y="100" class="gr-val">E</text>

    {/* Edge labels */}
    <text x="178" y="55"  class="gr-lbl">A–B</text>
    <text x="178" y="148" class="gr-lbl">A–C</text>
    <text x="302" y="64"  class="gr-lbl">B–D</text>
    <text x="302" y="148" class="gr-lbl">C–D</text>
    <text x="428" y="88"  class="gr-lbl">D–E</text>

    {/* Annotations column */}
    <text x="548" y="46"  class="gr-ann">Undirected: edges have</text>
    <text x="548" y="60"  class="gr-ann">no direction (A↔B)</text>
    <text x="548" y="84"  class="gr-ann">Directed: arrow shows</text>
    <text x="548" y="98"  class="gr-ann">one-way flow (A→B)</text>
    <text x="548" y="122" class="gr-ann">Weighted: edges carry</text>
    <text x="548" y="136" class="gr-ann">a cost (distance, time…)</text>

    {/* Adjacency list */}
    <text x="20"  y="205" class="gr-lbl" style="text-anchor:start;font-size:11px;fill:var(--diagram-text);font-weight:bold">Adjacency list (how this graph is stored):</text>
    <text x="20"  y="222" class="gr-lbl" style="text-anchor:start;font-family:monospace;font-size:11px;fill:var(--diagram-text)">A → [B, C]   B → [A, D]   C → [A, D]   D → [B, C, E]   E → [D]</text>
  </svg>